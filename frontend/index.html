<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LA Budget 2026-27 — Ask Anything</title>
<style>
  body{font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       max-width:1080px;margin:40px auto;padding:0 28px;color:#1a2433}
  h1{font-size:1.5rem;margin:0 0 4px}
  #status{font-size:.9rem;margin-bottom:20px;padding:6px 10px;border-radius:6px;display:inline-block}
  #status.loading{background:#fff7e6;color:#8a6d1a}
  #status.ready{background:#e6ffed;color:#1a7f37}
  #status.error{background:#ffe6e6;color:#b00020}
  form{display:flex;gap:8px;margin-bottom:20px}
  #q{flex:1;padding:10px 12px;font-size:1rem;border:1px solid #cbd5e0;border-radius:6px}
  button{padding:10px 18px;font-size:1rem;border:0;border-radius:6px;background:#2b6cb0;color:#fff;cursor:pointer}
  button:disabled{background:#a0aec0;cursor:not-allowed}
  #spinner{color:#5a6a7e;font-style:italic;margin:10px 0}
  #error{background:#ffe6e6;color:#b00020;padding:12px 14px;border-radius:6px;margin-bottom:16px}
  #result{border:1px solid #e2e8f0;border-radius:8px;padding:18px}
  #lastQuestion{font-weight:600;color:#5a6a7e;margin-bottom:10px}
  #answer{margin-bottom:16px}
  #answer > *:first-child{margin-top:0}
  #answer p{margin:0 0 10px}
  #answer ul,#answer ol{margin:0 0 10px;padding-left:22px}
  #answer li{margin-bottom:4px}
  #answer h1,#answer h2,#answer h3,#answer h4{margin:14px 0 6px;line-height:1.25}
  #answer h1{font-size:1.25rem}#answer h2{font-size:1.12rem}#answer h3{font-size:1rem}
  #answer code{background:#f0f3f7;padding:1px 5px;border-radius:4px;font-size:.9em}
  #answer pre{background:#f0f3f7;padding:10px;border-radius:6px;overflow:auto}
  #answer pre code{background:none;padding:0}
  #answer table{border-collapse:collapse;margin:0 0 10px;font-size:.92rem}
  #answer th,#answer td{border:1px solid #cbd5e0;padding:5px 8px;text-align:left}
  #answer blockquote{margin:0 0 10px;padding-left:12px;border-left:3px solid #cbd5e0;color:#5a6a7e}
  #answer a{color:#2b6cb0}
  #sources h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:#5a6a7e;margin:0 0 6px}
  #sourceList{margin:0;padding-left:20px;font-size:.92rem;color:#3a4a5e}
  #sourceList li{margin-bottom:6px}
  #response-body{display:flex;gap:28px;align-items:flex-start}
  #viz-container{flex:0 0 46%;max-width:46%;align-self:stretch}
  #text-col{flex:1 1 auto;min-width:0}
  @media (max-width:720px){
    #response-body{flex-direction:column}
    #viz-container{flex-basis:auto;max-width:none;width:100%}
  }
  .stat-title{font-size:.9rem;color:#5a6a7e;text-align:center;margin-bottom:4px}
  .stat-value{font-size:2.4rem;font-weight:700;color:#1c4e80;text-align:center}
  .viz-note{font-size:.82rem;color:#5a6a7e;margin-top:8px;font-style:italic}
  [hidden]{display:none !important}
</style>
</head>
<body>
  <h1>LA Budget 2026-27 — Ask Anything</h1>
  <div id="status" class="loading">Checking…</div>

  <form id="askForm">
    <input id="q" placeholder="e.g. How much does LA spend on police?" autocomplete="off" disabled>
    <button id="submitBtn" type="submit" disabled>Ask</button>
  </form>

  <div id="error" hidden></div>
  <div id="spinner" hidden>Thinking…</div>

  <div id="result" hidden>
    <div id="lastQuestion"></div>
    <div id="response-body">
      <!-- Chart (iteration 2) on the left; answer + sources on the right. Hidden until /ask returns a non-null viz. -->
      <div id="viz-container" hidden></div>
      <div id="text-col">
        <div id="answer"></div>
        <div id="sources">
          <h3>Sources:</h3>
          <ul id="sourceList"></ul>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API = "http://localhost:8000";

const statusEl  = document.getElementById("status");
const form      = document.getElementById("askForm");
const input     = document.getElementById("q");
const submitBtn = document.getElementById("submitBtn");
const spinner   = document.getElementById("spinner");
const errorEl   = document.getElementById("error");
const resultEl  = document.getElementById("result");
const lastQEl   = document.getElementById("lastQuestion");
const answerEl  = document.getElementById("answer");
const sourceList= document.getElementById("sourceList");
const vizEl     = document.getElementById("viz-container");

let chart = null;  // active Chart.js instance, destroyed + recreated per response

// ---- value formatting ----
function abbrDollars(value){
  const n = Math.abs(value);
  const fmt = (div, suf) => {
    let s = (value / div).toFixed(1);
    if(s.endsWith(".0")) s = s.slice(0, -2);
    return "$" + s + suf;
  };
  if(n >= 1e9) return fmt(1e9, "B");
  if(n >= 1e6) return fmt(1e6, "M");
  if(n >= 1e3) return fmt(1e3, "K");
  return "$" + Math.round(value);
}
function formatValue(value, unit){
  if(unit === "percent") return (Math.round(value * 10) / 10) + "%";
  if(unit === "count")   return Number(value).toLocaleString("en-US");
  return abbrDollars(value); // default: dollars
}

function setStatus(text, cls){ statusEl.textContent = text; statusEl.className = cls; }
function setReady(ready){ input.disabled = !ready; submitBtn.disabled = !ready; }

// ---- poll notebook status until ready ----
async function pollStatus(){
  try{
    const res = await fetch(API + "/notebook-status");
    const data = await res.json();
    if(data.status === "ready"){
      setStatus("Ready", "ready");
      setReady(true);
      return; // stop polling
    }
    if(data.status === "error"){
      setStatus("Backend error: " + (data.error || "unknown"), "error");
      setReady(false);
      return;
    }
    setStatus("Loading budget… (first run uploads the PDF, ~60s)", "loading");
  }catch(e){
    setStatus("Cannot reach backend at " + API + " — is the server running?", "error");
  }
  setReady(false);
  setTimeout(pollStatus, 2000);
}

// ---- ask ----
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if(!question) return;

  errorEl.hidden = true;
  spinner.hidden = false;
  submitBtn.disabled = true;
  // Note: previous answer stays visible until the new one arrives.

  try{
    const res = await fetch(API + "/ask", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ question })
    });
    if(!res.ok){
      const detail = await res.json().catch(() => ({}));
      throw new Error(detail.detail || ("HTTP " + res.status));
    }
    const data = await res.json();
    renderAnswer(data);
  }catch(err){
    errorEl.textContent = "Error: " + err.message;
    errorEl.hidden = false;
  }finally{
    spinner.hidden = true;
    submitBtn.disabled = false;
  }
});

function renderAnswer(data){
  lastQEl.textContent = data.question || "";

  const md = data.answer || "(no answer returned)";
  if(window.marked && window.DOMPurify){
    // parse markdown, then sanitize before inserting model output as HTML
    answerEl.innerHTML = DOMPurify.sanitize(marked.parse(md));
  }else{
    answerEl.textContent = md; // fallback if the CDN libs failed to load
  }

  sourceList.innerHTML = "";
  const citations = data.citations || [];
  for(const c of citations){
    const li = document.createElement("li");
    li.textContent = c;
    sourceList.appendChild(li);
  }
  document.getElementById("sources").hidden = citations.length === 0;

  // viz is rendered only when present; otherwise the container stays hidden.
  if(data.viz == null){
    if(chart){ chart.destroy(); chart = null; }
    vizEl.innerHTML = "";
    vizEl.hidden = true;
  }else{
    vizEl.hidden = false;
    renderViz(data.viz);
  }

  resultEl.hidden = false;
}

function renderViz(viz){
  if(chart){ chart.destroy(); chart = null; }
  vizEl.innerHTML = "";

  if(viz.type === "single_stat"){
    const item = (viz.data && viz.data[0]) || { value: 0 };
    vizEl.innerHTML =
      `<div class="stat-title">${viz.title || ""}</div>` +
      `<div class="stat-value">${formatValue(item.value, viz.unit)}</div>` +
      (viz.note ? `<div class="viz-note"></div>` : "");
    if(viz.note) vizEl.querySelector(".viz-note").textContent = viz.note;
    return;
  }

  // bar / pie need a canvas inside a sized wrapper (maintainAspectRatio: false)
  const wrap = document.createElement("div");
  wrap.style.position = "relative";
  const canvas = document.createElement("canvas");
  wrap.appendChild(canvas);
  vizEl.appendChild(wrap);
  if(viz.note){
    const note = document.createElement("div");
    note.className = "viz-note";
    note.textContent = viz.note;
    vizEl.appendChild(note);
  }

  if(viz.type === "bar"){
    const rows = [...viz.data].sort((a, b) => b.value - a.value); // largest → smallest
    wrap.style.height = (rows.length * 34 + 60) + "px";
    chart = new Chart(canvas, {
      type: "bar",
      data: {
        labels: rows.map(r => r.label),
        datasets: [{ data: rows.map(r => r.value), backgroundColor: "#2b6cb0", borderRadius: 3 }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: !!viz.title, text: viz.title },
          tooltip: { callbacks: { label: c => formatValue(c.raw, viz.unit) } }
        },
        scales: { x: { ticks: { callback: v => formatValue(v, viz.unit) } } }
      }
    });
  }else if(viz.type === "pie"){
    let rows = [...viz.data].sort((a, b) => b.value - a.value);
    if(rows.length > 8){
      const top = rows.slice(0, 7);
      const otherVal = rows.slice(7).reduce((s, r) => s + Number(r.value), 0);
      top.push({ label: "Other", value: otherVal });
      rows = top;
    }
    const total = rows.reduce((s, r) => s + Number(r.value), 0);
    wrap.style.height = "320px";
    chart = new Chart(canvas, {
      type: "doughnut",
      data: { labels: rows.map(r => r.label), datasets: [{ data: rows.map(r => r.value) }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "right" },
          title: { display: !!viz.title, text: viz.title },
          tooltip: { callbacks: { label: c => {
            const pct = total ? (100 * c.raw / total).toFixed(1) : "0";
            return `${c.label}: ${formatValue(c.raw, viz.unit)} (${pct}%)`;
          } } }
        }
      }
    });
  }
}

pollStatus();
</script>
</body>
</html>
